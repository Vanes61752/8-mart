<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Весенний квест | С 8 Марта!</title>
    <style>
        /* ======== СТИЛИ (без изменений) ======== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-image: url('https://avatars.mds.yandex.net/i?id=9745cb94018bd408783fedd9ea9900aa66078978-11547768-images-thumbs&n=13');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.2);
            pointer-events: none;
            z-index: 0;
        }

        .floating-flower {
            position: fixed;
            font-size: 2.5rem;
            opacity: 0.4;
            pointer-events: none;
            z-index: 2;
            animation: float 15s infinite ease-in-out;
            user-select: none;
        }

        .flower-1 { top: 10%; left: 5%; animation-duration: 18s; animation-delay: 0s; }
        .flower-2 { top: 70%; left: 8%; animation-duration: 20s; animation-delay: -3s; }
        .flower-3 { top: 30%; right: 10%; animation-duration: 22s; animation-delay: -7s; }
        .flower-4 { bottom: 15%; right: 5%; animation-duration: 19s; animation-delay: -2s; }
        .flower-5 { top: 50%; left: 15%; animation-duration: 25s; animation-delay: -10s; }
        .flower-6 { bottom: 30%; right: 15%; animation-duration: 21s; animation-delay: -5s; }
        .flower-7 { top: 15%; right: 20%; animation-duration: 23s; animation-delay: -8s; }
        .flower-8 { bottom: 20%; left: 20%; animation-duration: 24s; animation-delay: -12s; }

        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(15px, -20px) rotate(5deg); }
            50% { transform: translate(25px, 10px) rotate(10deg); }
            75% { transform: translate(5px, 25px) rotate(5deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        .quest-container {
            max-width: 750px;
            width: 100%;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 48px;
            box-shadow: 0 25px 45px -12px rgba(201, 120, 140, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.9);
            padding: 35px 30px;
            position: relative;
            z-index: 10;
        }

        .title-section {
            text-align: center;
            margin-bottom: 25px;
        }

        .title-section h1 {
            font-family: 'Georgia', 'Times New Roman', serif;
            font-size: 3.2rem;
            font-weight: 600;
            background: linear-gradient(135deg, #9b4b6e, #c0607e, #d68b8b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 1.15rem;
            font-weight: 300;
            color: #6c4b5e;
            border-bottom: 2px dashed #e9b6c2;
            padding-bottom: 15px;
            display: inline-block;
        }

        .question-card {
            background: rgba(255, 250, 245, 0.9);
            border-radius: 38px;
            padding: 30px 25px;
            margin: 20px 0;
            border: 1px solid #ffffffb3;
            box-shadow: inset 0 1px 4px #fff9f0, 0 12px 25px -15px #b38b97;
        }

        .question-emoji {
            width: 140px;
            height: 140px;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            transition: all 0.3s ease;
        }

        .question-emoji.unanswered {
            background: #2c2c2c;
            color: white;
            border-radius: 50%;
            font-size: 4rem;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        .question-emoji.answered {
            background: transparent;
            color: inherit;
            animation: gentleWave 3s infinite ease-in-out;
            filter: drop-shadow(0 10px 15px rgba(190, 110, 130, 0.3));
        }

        @keyframes gentleWave {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(5deg) scale(1.05); }
        }

        .question-text {
            font-size: 1.6rem;
            font-weight: 500;
            color: #452f3b;
            margin-bottom: 15px;
            line-height: 1.4;
            font-family: 'Georgia', 'Times New Roman', serif;
            text-align: center;
        }

        .hint-box {
            background: rgba(255, 225, 235, 0.9);
            border-radius: 60px;
            padding: 15px 22px;
            margin: 0 0 25px 0;
            border: 2px dashed #ffb6c1;
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 1.1rem;
            color: #994d6e;
        }

        .hint-icon {
            font-size: 1.8rem;
            min-width: 40px;
            text-align: center;
        }

        .hint-text {
            font-style: italic;
            font-weight: 400;
            line-height: 1.5;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .answer-input {
            padding: 18px 22px;
            border-radius: 50px;
            border: 2px solid #ffd9e2;
            background: #fffcfc;
            font-size: 1rem;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            color: #36212b;
            outline: none;
            transition: all 0.3s;
        }

        .answer-input:focus {
            border-color: #d67a9e;
            box-shadow: 0 8px 18px rgba(210, 120, 150, 0.25);
        }

        .answer-input::placeholder {
            color: #bb9ca8;
            font-style: italic;
        }

        .check-btn {
            background: linear-gradient(125deg, #dd91a8, #c76789);
            border: none;
            padding: 18px 25px;
            border-radius: 50px;
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 10px 20px -8px #ac6782;
            transition: all 0.25s ease;
            border: 1px solid #ffd9e2;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .check-btn:hover {
            background: linear-gradient(125deg, #e19bb2, #d17597);
            transform: translateY(-3px);
            box-shadow: 0 15px 25px -8px #b35f81;
        }

        .check-btn:active {
            transform: translateY(2px);
        }

        .message-area {
            min-height: 50px;
            margin: 15px 0 5px;
            text-align: center;
            font-size: 1rem;
            color: #824f63;
            background: rgba(255, 235, 240, 0.8);
            padding: 12px 18px;
            border-radius: 60px;
            border: 1px solid #fec5d2;
        }

        .progress-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 25px 0 15px;
        }

        .step-indicator {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .step-dot {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #ffdae3;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: #a05874;
            font-size: 1.3rem;
            box-shadow: 0 2px 6px #ffb8cf;
            transition: 0.25s;
            border: 2px solid transparent;
        }

        .step-dot.active {
            background: #cb8ca5;
            color: white;
            box-shadow: 0 0 18px #f7aec6;
            border-color: #ffffffb0;
            transform: scale(1.05);
        }

        .step-dot.completed {
            background: #b3d9c0;
            color: #266b44;
            box-shadow: 0 0 12px #a6d8b6;
            border-color: #c0f0d0;
        }

        .step-dot.completed::after {
            content: "✓";
        }

        .reset-link {
            color: #a15d7a;
            font-size: 1rem;
            text-decoration: none;
            border-bottom: 1px dashed #e0a2b6;
            cursor: pointer;
            font-weight: 500;
        }

        .reset-link:hover {
            color: #632d48;
            border-bottom: 2px solid #d4779b;
        }

        .final-screen {
            display: none;
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(14px);
            border-radius: 48px;
            padding: 35px 25px;
            margin-top: 20px;
            border: 2px solid #ffeef2;
            animation: softAppear 0.8s ease;
        }

        @keyframes softAppear {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }

        .final-screen h2 {
            font-family: 'Georgia', 'Times New Roman', serif;
            font-size: 3rem;
            color: #b14f73;
            margin-bottom: 15px;
        }

        .final-greeting {
            font-size: 4rem;
            line-height: 1.5;
            margin: 20px 0;
            animation: wave 2.5s infinite;
        }

        @keyframes wave {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(5deg) scale(1.1); }
            75% { transform: rotate(-5deg) scale(1.05); }
        }

        .final-cat-image {
            width: 100%;
            max-width: 400px;
            height: auto;
            border-radius: 30px;
            margin: 20px auto;
            box-shadow: 0 20px 30px rgba(190, 110, 130, 0.3);
            border: 4px solid white;
            display: block;
        }

        .cat-message {
            background: #fbe5ec;
            border-radius: 100px;
            padding: 20px 30px;
            font-size: 1.6rem;
            font-weight: 500;
            border: 3px solid white;
            color: #a1355c;
            font-family: 'Georgia', 'Times New Roman', serif;
            margin: 15px 0;
        }

        .certificate-btn {
            display: inline-block;
            background: linear-gradient(125deg, #ffb6c1, #ff8da1);
            border: none;
            padding: 18px 35px;
            border-radius: 60px;
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            text-decoration: none;
            box-shadow: 0 10px 20px -5px #b35f81;
            transition: all 0.3s;
            margin: 20px 0 10px;
            border: 2px solid white;
        }

        .certificate-btn:hover {
            transform: scale(1.05);
            background: linear-gradient(125deg, #ffc0cb, #ff9eb5);
            box-shadow: 0 15px 30px -5px #b35f81;
        }

        .gift-message {
            background: #fbe5ec;
            border-radius: 100px;
            padding: 18px;
            font-size: 1.5rem;
            border: 2px solid white;
            margin-top: 20px;
        }

        .heart {
            color: #d46788;
            font-size: 3rem;
            margin-top: 15px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .extra-flowers {
            display: flex;
            justify-content: center;
            margin-top: 20px;
            gap: 12px;
            font-size: 1.8rem;
            opacity: 0.7;
            color: #c27e96;
        }

        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            overflow: hidden;
        }

        .confetti {
            position: absolute;
            width: 12px;
            height: 12px;
            background-color: #f0f;
            opacity: 0.9;
            animation: confetti-fall linear forwards;
            border-radius: 2px;
        }

        @keyframes confetti-fall {
            0% {
                transform: translateY(-10vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(110vh) rotate(720deg);
                opacity: 0;
            }
        }

        .shake {
            animation: shake 0.4s ease-in-out;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        @media (max-width: 500px) {
            .quest-container { padding: 25px 18px; }
            .title-section h1 { font-size: 2.5rem; }
            .question-text { font-size: 1.4rem; }
            .step-dot { width: 38px; height: 38px; font-size: 1rem; }
            .hint-box { flex-direction: column; text-align: center; gap: 8px; }
            .cat-message { font-size: 1.3rem; }
            .final-cat-image { max-width: 280px; }
            .question-emoji { width: 100px; height: 100px; font-size: 4rem; }
            .final-greeting { font-size: 3rem; }
            .floating-flower { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="floating-flower flower-1">🌸</div>
    <div class="floating-flower flower-2">🌼</div>
    <div class="floating-flower flower-3">🌷</div>
    <div class="floating-flower flower-4">🌺</div>
    <div class="floating-flower flower-5">🌹</div>
    <div class="floating-flower flower-6">🌸</div>
    <div class="floating-flower flower-7">🌼</div>
    <div class="floating-flower flower-8">🌷</div>

    <div class="quest-container" id="questContainer">
        <div class="title-section">
            <h1>🌿 Весенний букет</h1>
            <div class="subtitle">квест для самой прекрасной</div>
        </div>

        <div id="dynamicContent"></div>
        <div id="progressAndReset"></div>

        <div class="extra-flowers">
            <span>🌼</span> <span>🌸</span> <span>🌷</span> <span>🌺</span> <span>🌹</span>
        </div>
    </div>

    <div id="confettiContainer" class="confetti-container" style="display: none;"></div>

    <script>
        (function() {
            // ========== ВОПРОСЫ С ЭМОДЗИ (четвёртый — про подснежник) ==========
            const questions = [
                {
                    text: "Этот цветок называют королевой сада, символом любви и красоты. Какой он?",
                    emoji: "🌹",
                    answer: "роза",
                    hint: "Бывает красной, белой, розовой... и имеет шипы"
                },
                {
                    text: "Сладкий, нежный, с орехами или фруктами, его дарят и обожают. Что это?",
                    emoji: "🍫",
                    answer: "шоколад",
                    hint: "Бывает молочным, горьким и белым, часто в красивой обёртке"
                },
                {
                    text: "Украшение, которое подчеркивает красоту рук, бывает с камнями или изящным плетением. Что это?",
                    emoji: "💍",
                    answer: "кольцо",
                    hint: "Его надевают на палец, часто в знак любви и верности"
                },
                {
                    // Четвёртый вопрос — теперь про подснежник
                    text: "Он первым появляется из-под снега, белый и нежный, чтобы возвестить о весне. Что это за цветок?",
                    emoji: "🌱",  // росток как символ подснежника
                    answer: "подснежник",
                    hint: "Его название говорит само за себя: растёт под снегом"
                },
                {
                    text: "В какой день марта отмечают Международный женский день? Напиши число.",
                    emoji: "8️⃣",
                    answer: "8",
                    hint: "Это число совпадает с номером месяца (март - третий месяц, но цифра другая)"
                },
                {
                    text: "Традиционное угощение, которое часто пекут на 8 Марта: лёгкий, воздушный, с кремом и фруктами. Что это?",
                    emoji: "🍰",
                    answer: "торт",
                    hint: "На день рождения его задувают свечи, а на 8 Марта просто едят с чаем"
                },
                {
                    text: "Что традиционно дарят женщинам на 8 Марта?",
                    emoji: "💐",
                    answer: "цветы",
                    hint: "Их собирают в букет, они пахнут и радуют глаз"
                },
                {
                    text: "Какой цвет чаще всего ассоциируется с 8 Марта? (Нежный, как лепестки роз)",
                    emoji: "🌸",
                    answer: "розовый",
                    hint: "Цвет фламинго, утренней зари и многих весенних цветов"
                }
            ];

            const TOTAL_STEPS = questions.length;
            let currentStep = 0;
            let completedSteps = 0;
            let isFinished = false;
            let canAnswer = true;

            const dynamicDiv = document.getElementById('dynamicContent');
            const progressDiv = document.getElementById('progressAndReset');
            const confettiContainer = document.getElementById('confettiContainer');

            function render() {
                if (isFinished) {
                    renderFinalScreen();
                } else {
                    renderQuestion(currentStep);
                }
                renderProgressAndReset();
            }

            function renderQuestion(index) {
                const q = questions[index];
                
                dynamicDiv.innerHTML = `
                    <div class="question-card">
                        <div class="question-emoji unanswered" id="questionEmoji">?</div>
                        <div class="question-text">${q.text}</div>
                        <div class="hint-box">
                            <div class="hint-icon">💡</div>
                            <div class="hint-text">Подсказка: ${q.hint}</div>
                        </div>
                        <div class="input-group">
                            <input type="text" class="answer-input" id="answerInput" placeholder="Твой ответ..." autocomplete="off">
                            <button class="check-btn" id="submitAnswerBtn">🔍 Проверить</button>
                        </div>
                        <div class="message-area" id="messageArea">✨ Напиши ответ и нажми проверить</div>
                    </div>
                `;

                const btn = document.getElementById('submitAnswerBtn');
                const input = document.getElementById('answerInput');
                const msg = document.getElementById('messageArea');
                const emojiContainer = document.getElementById('questionEmoji');

                if (btn) {
                    btn.addEventListener('click', () => checkAnswer(input, msg, emojiContainer, q));
                }
                if (input) {
                    input.addEventListener('keypress', (e) => {
                        if (e.key === 'Enter') {
                            e.preventDefault();
                            checkAnswer(input, msg, emojiContainer, q);
                        }
                    });
                }
            }

            function checkAnswer(inputEl, msgEl, emojiContainer, question) {
                if (!canAnswer) return;
                
                let userAnswer = inputEl.value.trim();
                
                if (!userAnswer) {
                    msgEl.innerHTML = "🌸 Напиши что-нибудь...";
                    return;
                }

                const normalizedUser = userAnswer.toLowerCase();
                const normalizedCorrect = question.answer.toLowerCase();

                if (normalizedUser === normalizedCorrect) {
                    msgEl.innerHTML = "✅ Прекрасно! Верно!";
                    msgEl.style.color = "#2c6b4a";
                    
                    // Меняем эмодзи на отвеченный (цветной)
                    emojiContainer.textContent = question.emoji;
                    emojiContainer.classList.remove('unanswered');
                    emojiContainer.classList.add('answered');
                    
                    canAnswer = false;
                    startConfetti();
                    
                    setTimeout(() => {
                        stopConfetti();
                        if (currentStep < TOTAL_STEPS - 1) {
                            currentStep++;
                            completedSteps++;
                            canAnswer = true;
                            render();
                        } else {
                            completedSteps = TOTAL_STEPS;
                            isFinished = true;
                            canAnswer = true;
                            render();
                        }
                    }, 2000);
                } else {
                    msgEl.innerHTML = "💔 Немного не так, попробуй еще...";
                    msgEl.style.color = "#b14b6a";
                    inputEl.classList.add('shake');
                    setTimeout(() => inputEl.classList.remove('shake'), 500);
                }
            }

            function startConfetti() {
                confettiContainer.style.display = 'block';
                confettiContainer.innerHTML = '';
                
                const colors = ['#ff6b6b', '#4ecdc4', '#ffe66d', '#c7b9ff', '#ffb8d1', '#a7e0e0', '#ffb347', '#98d8c8'];
                
                for (let i = 0; i < 100; i++) {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    
                    confetti.style.left = Math.random() * 100 + '%';
                    confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    
                    if (Math.random() > 0.5) {
                        confetti.style.borderRadius = '50%';
                    }
                    
                    const size = 8 + Math.random() * 10;
                    confetti.style.width = size + 'px';
                    confetti.style.height = size + 'px';
                    
                    const duration = 1 + Math.random() * 2;
                    confetti.style.animationDuration = duration + 's';
                    
                    confetti.style.animationDelay = Math.random() * 0.5 + 's';
                    
                    confettiContainer.appendChild(confetti);
                }
            }

            function stopConfetti() {
                confettiContainer.style.display = 'none';
                confettiContainer.innerHTML = '';
            }

            function renderFinalScreen() {
                dynamicDiv.innerHTML = `
                    <div class="final-screen" style="display: block;">
                        <h2>С 8 Марта!</h2>
                        
                        <div class="final-greeting">
                            🌸 🌷 🌹 🌼<br>
                            ✨ 8 МАРТА ✨<br>
                            🌺 🌸 🌷 🌹
                        </div>
                        
                        <p>Ты справилась с квестом!</p>
                        
                        <img src="https://img.freepik.com/free-photo/closeup-shot-ginger-cat-lying-near-bouquet-purple-tulips-isolated-white-background_181624-29157.jpg" 
                             alt="Рыжий котик с букетом тюльпанов" 
                             class="final-cat-image">
                        
                        <div class="cat-message">
                            Мяу! Поздравляю с 8 Марта!
                        </div>

                        <!-- Кнопка для получения сертификата -->
                        <a href="index2.html" class="certificate-btn">🎉 Получить сертификат 🎉</a>

                        <div class="gift-message">
                            🎁 Твой главный подарок — <br> моё восхищение и этот весенний букет!
                        </div>
                        
                        <p style="font-size: 1.2rem; margin-top: 25px;">Будь всегда такой же лучезарной ❤️</p>
                        <div class="heart">❤️</div>
                    </div>
                `;
            }

            function renderProgressAndReset() {
                let dotsHtml = '';
                for (let i = 0; i < TOTAL_STEPS; i++) {
                    let statusClass = '';
                    let inner = '';

                    if (i < completedSteps) {
                        statusClass = 'completed';
                        inner = '✓';
                    } else if (i === currentStep && !isFinished) {
                        statusClass = 'active';
                        inner = i + 1;
                    } else {
                        inner = i + 1;
                    }

                    dotsHtml += `<div class="step-dot ${statusClass}">${inner}</div>`;
                }

                const resetButton = !isFinished 
                    ? '<a class="reset-link" id="resetQuestBtn">↺ начать заново</a>' 
                    : '<a class="reset-link" id="resetQuestBtn">🌸 пройти ещё раз</a>';

                progressDiv.innerHTML = `
                    <div class="progress-section">
                        <div class="step-indicator">${dotsHtml}</div>
                        ${resetButton}
                    </div>
                `;

                const resetBtn = document.getElementById('resetQuestBtn');
                if (resetBtn) {
                    resetBtn.addEventListener('click', resetQuest);
                }
            }

            function resetQuest() {
                currentStep = 0;
                completedSteps = 0;
                isFinished = false;
                canAnswer = true;
                stopConfetti();
                render();
            }

            // Запуск
            render();
        })();
    </script>
</body>
</html>
